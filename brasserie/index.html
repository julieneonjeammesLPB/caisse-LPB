<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Papas Brasseurs — Gestion Brassicole</title>

  <!-- React 18 (pas besoin de Babel — JS déjà transpilé) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- XLSX pour exports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Firebase 10 compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const _FB_CFG = {
      apiKey:            "AIzaSyD9KYULfZ49z2CI7ozPityiXxtqTkxtET4",
      authDomain:        "gestion-les-papas-brasseurs.firebaseapp.com",
      projectId:         "gestion-les-papas-brasseurs",
      storageBucket:     "gestion-les-papas-brasseurs.firebasestorage.app",
      messagingSenderId: "899284537505",
      appId:             "1:899284537505:web:7433fec86f48ebde4d20e0"
    };
    if (_FB_CFG.apiKey !== "VOTRE_API_KEY") {
      firebase.initializeApp(_FB_CFG);
      window._db = firebase.firestore();
      window._db.enablePersistence({ synchronizeTabs: true }).catch(e => {
        if (e.code === 'failed-precondition') console.warn('Multi-onglets : persistance désactivée');
        else if (e.code === 'unimplemented') console.warn('Navigateur sans support offline');
      });
    } else {
      window._db = null;
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #1a1612; font-family: 'Outfit', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { display: none; height: 100%; }

    #splash {
      position: fixed; inset: 0;
      background: #1a1612;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; z-index: 9999;
    }
    #splash-logo { font-size: 64px; animation: splash-bounce 1.2s ease-in-out infinite; }
    @keyframes splash-bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    #splash-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; color: #F2E8D5; }
    #splash-sub   { font-size: 0.9rem; color: rgba(242,232,213,0.45); }
    #splash-bar-wrap { width: 220px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    #splash-bar {
      height: 100%; width: 40%; background: #E8A020; border-radius: 4px;
      animation: splash-slide 1.4s ease-in-out infinite;
    }
    @keyframes splash-slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(150%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo">🍺</div>
    <div id="splash-title">Les Papas Brasseurs</div>
    <div id="splash-sub">Chargement des données…</div>
    <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  </div>
  <div id="root"></div>

  <!-- Application pré-transpilée (pas de Babel dans le navigateur) -->
  <script src="app.js"></script>
</body>
</html>
