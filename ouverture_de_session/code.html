<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=DM+Mono:wght@400;500&amp;family=Outfit:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#fffbff",
                        "surface": "#faf9f5",
                        "secondary": "#5f5e62",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary": "#00628a",
                        "surface-bright": "#faf9f5",
                        "surface-container-low": "#f4f4f0",
                        "primary-fixed-dim": "#ffb95f",
                        "inverse-primary": "#ffb95f",
                        "outline-variant": "#d7c3b0",
                        "surface-container-high": "#e8e8e4",
                        "inverse-on-surface": "#f1f1ed",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#004c6b",
                        "on-secondary-fixed-variant": "#47464b",
                        "on-surface-variant": "#524436",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#2a1700",
                        "surface-container-highest": "#e3e3df",
                        "surface-dim": "#dadad6",
                        "tertiary-fixed-dim": "#83cfff",
                        "primary-fixed": "#ffddb8",
                        "inverse-surface": "#2f312e",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#656468",
                        "surface-tint": "#855300",
                        "outline": "#847464",
                        "on-primary-fixed-variant": "#653e00",
                        "on-tertiary-container": "#fcfcff",
                        "on-surface": "#1a1c1a",
                        "surface-variant": "#e3e3df",
                        "secondary-fixed": "#e4e1e7",
                        "tertiary-container": "#007dad",
                        "on-tertiary-fixed": "#001e2d",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#1b1b1f",
                        "tertiary-fixed": "#c6e7ff",
                        "secondary-container": "#e4e1e7",
                        "primary-container": "#a46700",
                        "surface-container": "#eeeeea",
                        "secondary-fixed-dim": "#c8c5cb",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1a",
                        "error-container": "#ffdad6",
                        "background": "#faf9f5",
                        "primary": "#825100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Outfit", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"],
                        "mono": ["DM Mono", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .font-mono { font-family: 'DM Mono', monospace; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Supressing Navigation Shell for Transactional Screen -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-xl flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<div class="mb-6 inline-flex items-center justify-center w-24 h-24 rounded-full bg-surface-container-highest">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="sports_bar">sports_bar</span>
</div>
<h1 class="font-outfit text-3xl font-black tracking-tight text-on-surface mb-2">Les Papas Brasseurs</h1>
<p class="font-outfit text-on-surface-variant font-medium uppercase tracking-widest text-sm">Caisse Événementielle</p>
</div>
<!-- Login Form Container -->
<div class="w-full bg-surface-container-low rounded-[2rem] p-8 md:p-12">
<form class="space-y-10">
<!-- Session Name Input -->
<div class="space-y-4">
<label class="font-outfit text-on-surface-variant font-semibold text-sm px-2" for="session-name">Nom de la session</label>
<div class="relative">
<input class="w-full h-16 px-6 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all text-lg font-outfit text-on-surface placeholder:text-stone-300" id="session-name" placeholder="ex: Marché de Noël" type="text"/>
</div>
</div>
<!-- Initial Cash Input -->
<div class="space-y-4">
<label class="font-outfit text-on-surface-variant font-semibold text-sm px-2" for="initial-cash">Fond de caisse initial</label>
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
<span class="font-mono text-2xl text-primary font-medium">€</span>
</div>
<input class="w-full h-24 pl-12 pr-6 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all text-5xl font-mono text-primary font-bold placeholder:text-primary/10 text-right" id="initial-cash" placeholder="000.00" step="0.01" type="number"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[72px] bg-inverse-surface text-on-primary-container rounded-xl font-outfit text-xl font-bold tracking-tight flex items-center justify-center gap-3 hover:opacity-95 active:scale-[0.98] transition-all" type="submit">
                        Démarrer la session
                        <span class="material-symbols-outlined" data-icon="play_circle">play_circle</span>
</button>
</form>
</div>
<!-- Contextual Information -->
<div class="mt-12 flex flex-col items-center space-y-4">
<div class="flex items-center gap-4 bg-surface-container rounded-full px-6 py-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="calendar_today">calendar_today</span>
<span class="font-outfit text-on-surface-variant font-bold text-sm tracking-wide">MARDI 8 AVRIL 2026</span>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-outfit text-xs text-on-surface-variant/70 uppercase font-black tracking-tighter">Terminal 01 • Connecté</span>
</div>
</div>
</div>
</main>
<!-- Visual Polish: Subtle Texture or Graphic -->
<div class="fixed bottom-0 right-0 p-12 opacity-[0.03] pointer-events-none select-none overflow-hidden">
<span class="material-symbols-outlined text-[300px] leading-none" data-icon="water_drop">water_drop</span>
</div>
</body></html>
